[build]
  publish = "."

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://identity.netlify.com https://unpkg.com; connect-src 'self' https://api.netlify.com https://identity.netlify.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;"
