<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Files — SweetlyHannahMade</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50:'#fdf2f6',100:'#f5dce6',200:'#e8c4d2',300:'#d4a3b8',400:'#c98da8',500:'#c48a9e',600:'#b87a90',700:'#a0687c' }}}}}
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-brand-700">Manage PDFs & Videos</h1>
        <p class="text-gray-500 text-sm mt-1">Upload, replace, or remove downloadable files for your products</p>
      </div>
      <a href="/" class="text-brand-600 hover:text-brand-700 text-sm font-medium">Back to site</a>
    </div>

    <div id="loading" class="text-center py-20 text-gray-400">Loading products...</div>
    <div id="products-list" class="space-y-4 hidden"></div>
  </div>

  <script>
    function escapeText(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.textContent;
    }

    async function loadProducts() {
      try {
        var res = await fetch('/api/pdf-admin');
        var data = await res.json();
        var list = document.getElementById('products-list');
        document.getElementById('loading').classList.add('hidden');
        list.classList.remove('hidden');

        data.products.sort(function(a, b) { return a.title.localeCompare(b.title); });

        data.products.forEach(function(product) {
          var card = document.createElement('div');
          card.className = 'bg-white rounded-xl border border-gray-200 p-5 shadow-sm';

          // Title
          var titleEl = document.createElement('h3');
          titleEl.className = 'font-semibold text-gray-800';
          titleEl.textContent = product.title;
          card.appendChild(titleEl);

          // Current files
          if (product.files && product.files.length > 0) {
            product.files.forEach(function(f) {
              var fileRow = document.createElement('div');
              fileRow.className = 'flex items-center justify-between bg-green-50 border border-green-200 rounded-lg px-3 py-2 mt-2';
              var nameSpan = document.createElement('span');
              nameSpan.className = 'text-sm text-green-700 font-medium truncate';
              nameSpan.textContent = f;
              var removeBtn = document.createElement('button');
              removeBtn.className = 'text-red-400 hover:text-red-600 text-xs font-medium ml-2 whitespace-nowrap';
              removeBtn.textContent = 'Remove';
              removeBtn.addEventListener('click', function() { removePdf(product.id, f, removeBtn); });
              fileRow.appendChild(nameSpan);
              fileRow.appendChild(removeBtn);
              card.appendChild(fileRow);
            });
          } else {
            var noFile = document.createElement('p');
            noFile.className = 'text-sm text-orange-500 mt-2';
            noFile.textContent = 'No PDF attached';
            card.appendChild(noFile);
          }

          // Video status
          var videoSection = document.createElement('div');
          videoSection.className = 'mt-2';
          if (product.video) {
            var videoRow = document.createElement('div');
            videoRow.className = 'flex items-center justify-between bg-blue-50 border border-blue-200 rounded-lg px-3 py-2';
            var videoLabel = document.createElement('span');
            videoLabel.className = 'text-sm text-blue-700 font-medium';
            videoLabel.textContent = 'Video attached';
            var removeVidBtn = document.createElement('button');
            removeVidBtn.className = 'text-red-400 hover:text-red-600 text-xs font-medium ml-2';
            removeVidBtn.textContent = 'Remove video';
            removeVidBtn.addEventListener('click', function() { removeVideo(product.id, removeVidBtn); });
            videoRow.appendChild(videoLabel);
            videoRow.appendChild(removeVidBtn);
            videoSection.appendChild(videoRow);
          } else {
            var vidUploadRow = document.createElement('div');
            vidUploadRow.className = 'flex items-center gap-2 flex-wrap';
            var vidInput = document.createElement('input');
            vidInput.type = 'file';
            vidInput.accept = 'video/mp4,video/*';
            vidInput.className = 'text-xs flex-1 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-100 file:text-blue-700';
            var vidBtn = document.createElement('button');
            vidBtn.className = 'bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2 rounded-full';
            vidBtn.textContent = 'Upload Video';
            vidBtn.addEventListener('click', function() {
              if (!vidInput.files.length) { alert('Select a video file'); return; }
              uploadVideo(product.id, vidInput.files[0], vidBtn);
            });
            vidUploadRow.appendChild(vidInput);
            vidUploadRow.appendChild(vidBtn);
            videoSection.appendChild(vidUploadRow);
          }
          card.appendChild(videoSection);

          // PDF Upload form
          var formRow = document.createElement('div');
          formRow.className = 'mt-3 flex items-center gap-2 flex-wrap';

          var fileInput = document.createElement('input');
          fileInput.type = 'file';
          fileInput.accept = '.pdf';
          fileInput.className = 'text-xs flex-1 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-brand-100 file:text-brand-700';

          var replaceLabel = document.createElement('label');
          replaceLabel.className = 'flex items-center gap-1 text-xs text-gray-500';
          var replaceCheck = document.createElement('input');
          replaceCheck.type = 'checkbox';
          replaceCheck.checked = true;
          replaceLabel.appendChild(replaceCheck);
          replaceLabel.appendChild(document.createTextNode(' Replace existing'));

          var uploadBtn = document.createElement('button');
          uploadBtn.className = 'bg-brand-600 hover:bg-brand-700 text-white text-xs font-semibold px-4 py-2 rounded-full';
          uploadBtn.textContent = 'Upload PDF';
          uploadBtn.addEventListener('click', function() {
            if (!fileInput.files.length) { alert('Please select a PDF file'); return; }
            uploadPdf(product.id, product.title, fileInput.files[0], replaceCheck.checked, uploadBtn);
          });

          formRow.appendChild(fileInput);
          formRow.appendChild(replaceLabel);
          formRow.appendChild(uploadBtn);
          card.appendChild(formRow);

          list.appendChild(card);
        });
      } catch (err) {
        document.getElementById('loading').textContent = 'Error loading products: ' + err.message;
      }
    }

    async function uploadPdf(productId, title, file, replace, btn) {
      btn.textContent = 'Uploading...';
      btn.disabled = true;

      var formData = new FormData();
      formData.append('file', file);
      formData.append('productId', productId);
      formData.append('title', title);
      formData.append('replace', replace ? 'true' : 'false');

      try {
        var res = await fetch('/api/upload-pdf', { method: 'POST', body: formData });
        var data = await res.json();
        if (data.success) {
          location.reload();
        } else {
          alert('Error: ' + (data.error || 'Upload failed'));
          btn.textContent = 'Upload PDF';
          btn.disabled = false;
        }
      } catch (e) {
        alert('Upload failed. Try again.');
        btn.textContent = 'Upload PDF';
        btn.disabled = false;
      }
    }

    async function removePdf(productId, filename, btn) {
      if (!confirm('Remove "' + filename + '" from this product?')) return;
      btn.textContent = 'Removing...';

      try {
        var res = await fetch('/api/remove-pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId: productId, filename: filename }),
        });
        var data = await res.json();
        if (data.success) location.reload();
        else alert('Error: ' + data.error);
      } catch (e) {
        alert('Failed to remove. Try again.');
        btn.textContent = 'Remove';
      }
    }

    async function uploadVideo(productId, file, btn) {
      btn.textContent = 'Uploading...';
      btn.disabled = true;
      var formData = new FormData();
      formData.append('file', file);
      formData.append('productId', productId);
      try {
        var res = await fetch('/api/upload-video', { method: 'POST', body: formData });
        var data = await res.json();
        if (data.success) location.reload();
        else { alert('Error: ' + (data.error || 'Failed')); btn.textContent = 'Upload Video'; btn.disabled = false; }
      } catch(e) { alert('Upload failed'); btn.textContent = 'Upload Video'; btn.disabled = false; }
    }

    async function removeVideo(productId, btn) {
      if (!confirm('Remove video from this product?')) return;
      btn.textContent = 'Removing...';
      try {
        var res = await fetch('/api/remove-video', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({productId:productId}) });
        var data = await res.json();
        if (data.success) location.reload();
        else alert('Error: ' + data.error);
      } catch(e) { alert('Failed'); btn.textContent = 'Remove video'; }
    }

    loadProducts();
  </script>
</body>
</html>
