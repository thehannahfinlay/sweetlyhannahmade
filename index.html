<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SweetlyHannahMade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#fff5fb',
              100: '#FFCFF6',
              200: '#f0d4e4',
              300: '#e3bcd0',
              400: '#DAA2BA',
              500: '#DAA2BA',
              600: '#c08aa0',
              700: '#9e6e82',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-white text-gray-800 font-sans">

  <!-- 1. Announcement Bar -->
  <div id="announcement-bar" class="hidden bg-brand-600 text-white text-center text-sm py-2 px-4 font-medium"></div>

  <!-- 2. Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold text-brand-600 tracking-tight hover:text-brand-700 transition-colors">
        SweetlyHannahMade
      </a>
      <nav class="flex items-center gap-6">
        <a href="category.html?id=patterns" class="text-gray-600 hover:text-brand-600 font-medium transition-colors text-sm md:text-base">Patterns</a>
        <a href="category.html?id=plushies" class="text-gray-600 hover:text-brand-600 font-medium transition-colors text-sm md:text-base">Plushies</a>
        <div id="social-links" class="flex items-center gap-3 ml-2"></div>
      </nav>
    </div>
  </header>

  <!-- 3. Hero -->
  <section class="bg-gradient-to-br from-brand-100 via-brand-50 to-white py-20 px-4 text-center">
    <div class="max-w-2xl mx-auto">
      <div class="text-5xl mb-4">🧶</div>
      <h1 class="text-4xl md:text-5xl font-bold text-brand-700 mb-4 leading-tight">SweetlyHannahMade</h1>
      <p id="hero-tagline" class="text-lg md:text-xl text-brand-600 font-medium mb-8"></p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="category.html?id=plushies" class="bg-brand-500 hover:bg-brand-600 text-white font-semibold px-8 py-3 rounded-full transition-colors shadow-md">Shop Plushies</a>
        <a href="category.html?id=patterns" class="bg-white hover:bg-brand-50 text-brand-600 font-semibold px-8 py-3 rounded-full border-2 border-brand-300 transition-colors">Browse Patterns</a>
      </div>
    </div>
  </section>

  <!-- 4. Category Tiles -->
  <section class="max-w-6xl mx-auto px-4 py-16">
    <h2 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-10">Shop by Category</h2>
    <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </section>

  <!-- 5. Featured Products -->
  <section class="bg-brand-50 py-16 px-4">
    <div class="max-w-6xl mx-auto">
      <h2 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-10">Featured Items</h2>
      <div id="featured-products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
  </section>

  <!-- 6. Trust Badges -->
  <section class="py-14 px-4 bg-white">
    <div class="max-w-4xl mx-auto">
      <div id="trust-badges" class="grid grid-cols-1 sm:grid-cols-3 gap-6"></div>
    </div>
  </section>

  <!-- 7. About Me -->
  <section class="bg-brand-50 py-16 px-4">
    <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-10">
      <div class="flex-shrink-0">
        <img id="about-photo" src="" alt="Hannah" class="w-48 h-48 rounded-full object-cover shadow-lg border-4 border-brand-200 hidden">
        <div id="about-photo-placeholder" class="w-48 h-48 rounded-full bg-brand-200 flex items-center justify-center text-6xl shadow-lg border-4 border-brand-300">🧶</div>
      </div>
      <div>
        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">About Hannah</h2>
        <p id="about-text" class="text-gray-600 leading-relaxed text-lg"></p>
        <div class="mt-6 flex gap-4" id="about-social-links"></div>
      </div>
    </div>
  </section>

  <!-- 8. Testimonials -->
  <section class="py-16 px-4 bg-white">
    <div class="max-w-6xl mx-auto">
      <h2 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-10">What Customers Say</h2>
      <div id="testimonials" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>
  </section>

  <!-- 9. Instagram Feed (Behold embed rendered by JS if beholdEmbedId is set) -->
  <section id="instagram-section" class="py-16 px-4 bg-brand-50 hidden">
    <div class="max-w-6xl mx-auto">
      <h2 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-2">Follow Along</h2>
      <p class="text-center text-brand-500 font-medium mb-8">
        <a id="instagram-handle-link" href="#" target="_blank" rel="noopener noreferrer" class="hover:text-brand-700 transition-colors"></a>
      </p>
      <div id="behold-embed"></div>
    </div>
  </section>

  <!-- 10. Footer -->
  <footer class="bg-gray-800 text-gray-300 py-10 px-4">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
      <div>
        <p class="text-white font-bold text-lg">SweetlyHannahMade</p>
        <p class="text-sm mt-1 text-gray-400">Handmade with love</p>
      </div>
      <nav class="flex flex-wrap gap-4 text-sm">
        <a href="category.html?id=patterns" class="hover:text-white transition-colors">Patterns</a>
        <a href="category.html?id=plushies" class="hover:text-white transition-colors">Plushies</a>
        <a href="policy.html#shipping" class="hover:text-white transition-colors">Shipping Policy</a>
        <a href="policy.html#refunds" class="hover:text-white transition-colors">Refunds</a>
        <a href="policy.html#privacy" class="hover:text-white transition-colors">Privacy Policy</a>
      </nav>
      <p class="text-sm text-gray-500">&copy; <span id="footer-year"></span> SweetlyHannahMade</p>
    </div>
  </footer>

  <script src="assets/shop.js"></script>
  <script>
    async function init() {
      const inv = await getInventory();
      const shop = inv.shop;

      // 1. Announcement Bar
      if (shop.announcement) {
        const bar = document.getElementById('announcement-bar');
        bar.textContent = shop.announcement;
        bar.classList.remove('hidden');
      }

      // 2. Header — social icons via DOM (avoids innerHTML with dynamic content)
      const socialLinks = document.getElementById('social-links');
      if (shop.instagram) {
        socialLinks.appendChild(makeSocialAnchor(shop.instagram, 'Instagram', INSTAGRAM_PATH));
      }
      if (shop.tiktok) {
        socialLinks.appendChild(makeSocialAnchor(shop.tiktok, 'TikTok', TIKTOK_PATH));
      }

      // 3. Hero — tagline via textContent
      document.getElementById('hero-tagline').textContent = shop.tagline || '';

      // 4. Category Tiles — escapeHtml for all text in template literals
      const categoryGrid = document.getElementById('category-grid');
      if (inv.categories && inv.categories.length) {
        categoryGrid.insertAdjacentHTML('beforeend', inv.categories.map(cat => `
          <a href="category.html?id=${escapeHtml(cat.id)}"
             class="group block rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-shadow bg-white border border-brand-100">
            <div class="relative overflow-hidden h-56 bg-brand-100">
              <img src="${escapeHtml(cat.coverImage)}" alt="${escapeHtml(cat.name)}"
                   class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                   onerror="this.style.display='none'">
            </div>
            <div class="p-6">
              <h3 class="text-xl font-bold text-gray-800 mb-2">${escapeHtml(cat.name)}</h3>
              <p class="text-gray-500 text-sm leading-relaxed">${escapeHtml(cat.description)}</p>
              <span class="inline-block mt-4 text-brand-500 font-semibold text-sm group-hover:text-brand-700 transition-colors">Shop now &rarr;</span>
            </div>
          </a>
        `).join(''));
      }

      // 5. Featured Products — escapeHtml for name/price in template literals
      const featuredContainer = document.getElementById('featured-products');
      const featured = (inv.products || []).filter(p => p.featured === true);
      if (featured.length) {
        featuredContainer.insertAdjacentHTML('beforeend', featured.map(product => `
          <a href="product.html?id=${escapeHtml(product.id)}"
             class="group bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-shadow border border-brand-100 flex flex-col">
            <div class="relative overflow-hidden h-52 bg-brand-50">
              <img src="${escapeHtml(product.images && product.images[0] ? product.images[0] : '')}"
                   alt="${escapeHtml(product.name)}"
                   class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                   onerror="this.style.display='none'">
              ${!product.inStock ? '<span class="absolute top-3 left-3 bg-gray-500 text-white text-xs font-bold px-3 py-1 rounded-full">Out of Stock</span>' : ''}
            </div>
            <div class="p-5 flex flex-col flex-1">
              <h3 class="font-bold text-gray-800 text-base mb-1 flex-1">${escapeHtml(product.name)}</h3>
              ${product.difficulty ? `<p class="text-xs text-brand-400 font-medium mb-2">${escapeHtml(product.difficulty)}</p>` : ''}
              <p class="text-brand-600 font-bold text-lg mt-auto">${escapeHtml(formatPrice(product.price))}</p>
            </div>
          </a>
        `).join(''));
      } else {
        const p = document.createElement('p');
        p.className = 'col-span-3 text-center text-gray-400';
        p.textContent = 'No featured items yet.';
        featuredContainer.appendChild(p);
      }

      // 6. Trust Badges — escapeHtml for badge text
      const trustBadgesEl = document.getElementById('trust-badges');
      if (inv.trustBadges && inv.trustBadges.length) {
        trustBadgesEl.insertAdjacentHTML('beforeend', inv.trustBadges.map(badge => `
          <div class="bg-brand-50 rounded-2xl p-6 text-center border border-brand-100">
            ${DOMPurify.sanitize(renderIcon(badge.icon))}
            <p class="font-semibold text-gray-700 text-sm">${escapeHtml(badge.text)}</p>
          </div>
        `).join(''));
      }

      // 7. About Me — textContent for bio text
      document.getElementById('about-text').textContent = shop.about || '';

      if (shop.aboutPhoto) {
        const img = document.getElementById('about-photo');
        const placeholder = document.getElementById('about-photo-placeholder');
        img.src = shop.aboutPhoto;
        img.classList.remove('hidden');
        placeholder.classList.add('hidden');
        img.onerror = function() {
          img.classList.add('hidden');
          placeholder.classList.remove('hidden');
        };
      }

      const aboutSocialLinks = document.getElementById('about-social-links');
      function makeAboutSocialAnchor(href, label, svgPath, linkText) {
        const a = document.createElement('a');
        a.href = href;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'inline-flex items-center gap-2 text-brand-500 hover:text-brand-700 font-medium text-sm transition-colors';
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('class', 'w-4 h-4');
        svg.setAttribute('fill', 'currentColor');
        svg.setAttribute('viewBox', '0 0 24 24');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', svgPath);
        svg.appendChild(path);
        a.appendChild(svg);
        a.appendChild(document.createTextNode(linkText));
        return a;
      }
      if (shop.instagram) {
        aboutSocialLinks.appendChild(makeAboutSocialAnchor(shop.instagram, 'Instagram', INSTAGRAM_PATH, 'Instagram'));
      }
      if (shop.tiktok) {
        aboutSocialLinks.appendChild(makeAboutSocialAnchor(shop.tiktok, 'TikTok', TIKTOK_PATH, 'TikTok'));
      }

      // 8. Testimonials — escapeHtml for name and text
      const testimonialsEl = document.getElementById('testimonials');
      if (inv.testimonials && inv.testimonials.length) {
        testimonialsEl.insertAdjacentHTML('beforeend', inv.testimonials.map(t => `
          <div class="bg-brand-50 rounded-2xl p-6 border border-brand-100 flex flex-col">
            <p class="text-yellow-400 text-lg mb-3">${renderStars(t.rating)}</p>
            <p class="text-gray-600 leading-relaxed flex-1 italic">&ldquo;${escapeHtml(t.text)}&rdquo;</p>
            <p class="mt-4 font-semibold text-gray-800 text-sm">${escapeHtml(t.name)}</p>
          </div>
        `).join(''));
      }

      // 9. Instagram Feed — only render Behold embed if beholdEmbedId is set and not the placeholder
      const beholdId = shop.beholdEmbedId;
      if (beholdId && beholdId !== 'YOUR_BEHOLD_EMBED_ID') {
        const instagramSection = document.getElementById('instagram-section');
        const beholdEmbed = document.getElementById('behold-embed');
        const handleLink = document.getElementById('instagram-handle-link');

        if (shop.instagram) {
          handleLink.href = shop.instagram;
          handleLink.textContent = '@' + shop.instagram.replace(/\/$/, '').split('/').pop();
        }

        // Build embed using DOM to avoid inserting raw HTML
        const widgetDiv = document.createElement('div');
        widgetDiv.id = beholdId;
        beholdEmbed.appendChild(widgetDiv);

        const script = document.createElement('script');
        script.src = 'https://w.behold.so/widget.js';
        script.type = 'module';
        document.body.appendChild(script);

        instagramSection.classList.remove('hidden');
      }

      // 10. Footer — copyright year
      document.getElementById('footer-year').textContent = new Date().getFullYear();
    }

    init();
  </script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>

</body>
</html>
